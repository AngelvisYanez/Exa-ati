# ===================================================
# Docker Compose para Plesk — Exa-ATI
# ===================================================
# Uso: docker compose -f docker-compose.plesk.yml --env-file .env up -d
#
# Este archivo está diseñado para despliegue en Plesk donde:
# - Plesk maneja Nginx/Apache como proxy inverso
# - Plesk maneja SSL/TLS con sus certificados
# - Solo necesitamos la app + PostgreSQL local (opcional)
#
# Si usas Neon u otra DB externa, comenta el servicio 'db'
# y configura DATABASE_URL apuntando a tu DB externa.
# ===================================================

services:
  # ─── PostgreSQL 16 (opcional — quitar si usas DB externa) ─────
  db:
    image: postgres:16-alpine
    container_name: exa-ati-db
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exa_ati
    volumes:
      - exa-ati-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exa_ati"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - exa-ati-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Aplicación Next.js + Playwright ─────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exa-ati-app
    user: "1001:1001"
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - exa-ati-downloads:/app/downloads
      - exa-ati-browser-session:/app/browser_session
      - exa-ati-logs:/app/logs
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HEADLESS: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - exa-ati-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  exa-ati-postgres:
    name: exa-ati-postgres
  exa-ati-downloads:
    name: exa-ati-downloads
  exa-ati-browser-session:
    name: exa-ati-browser-session
  exa-ati-logs:
    name: exa-ati-logs

networks:
  exa-ati-net:
    driver: bridge
    name: exa-ati-network
